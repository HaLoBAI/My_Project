version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: hair-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: hair_accessory_db
      MYSQL_USER: hair_app
      MYSQL_PASSWORD: hair_app_pass
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/init-database.sql:/docker-entrypoint-initdb.d/init.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    networks:
      - hair-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: hair-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis123456 --maxmemory 1gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - hair-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO对象存储
  minio:
    image: minio/minio:latest
    container_name: hair-minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123456
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - hair-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Gateway服务
  gateway:
    build:
      context: ./backend/gateway
      dockerfile: Dockerfile
    container_name: hair-gateway
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    depends_on:
      - mysql
      - redis
    networks:
      - hair-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # User服务
  user-service:
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    container_name: hair-user-service
    restart: always
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hair_accessory_db?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: hair_app
      SPRING_DATASOURCE_PASSWORD: hair_app_pass
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PASSWORD: redis123456
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hair-network

  # Product服务
  product-service:
    build:
      context: ./backend/product-service
      dockerfile: Dockerfile
    container_name: hair-product-service
    restart: always
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hair_accessory_db?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: hair_app
      SPRING_DATASOURCE_PASSWORD: hair_app_pass
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PASSWORD: redis123456
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hair-network

  # Image服务
  image-service:
    build:
      context: ./backend/image-service
      dockerfile: Dockerfile
    container_name: hair-image-service
    restart: always
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hair_accessory_db?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: hair_app
      SPRING_DATASOURCE_PASSWORD: hair_app_pass
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PASSWORD: redis123456
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: admin123456
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      - minio
    networks:
      - hair-network

  # AI服务
  ai-service:
    build:
      context: ./backend/ai-service
      dockerfile: Dockerfile
    container_name: hair-ai-service
    restart: always
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hair_accessory_db?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: hair_app
      SPRING_DATASOURCE_PASSWORD: hair_app_pass
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PASSWORD: redis123456
      AI_API_KEY: ${AI_API_KEY}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hair-network

  # 前端Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hair-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/ssl:/etc/nginx/ssl:ro
    depends_on:
      - gateway
    networks:
      - hair-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  hair-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
