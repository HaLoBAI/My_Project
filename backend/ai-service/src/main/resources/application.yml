server:
  port: 8084

spring:
  application:
    name: ai-service
    
  datasource:
    url: jdbc:mysql://localhost:3306/hair_accessory_db?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
    username: hair_app
    password: hair_app_pass
    driver-class-name: com.mysql.cj.jdbc.Driver

# AI服务配置（根据实际选择的AI服务提供商配置）
ai:
  service:
    provider: mock # 可选: openai, stability, replicate, mock
    api-key: ${AI_API_KEY:your-api-key-here}
    endpoint: ${AI_API_ENDPOINT:https://api.openai.com/v1}
    
logging:
  level:
    com.hairaccent: DEBUG
